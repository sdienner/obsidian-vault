# GitHub Action for Claude Code Integration

name: Claude Code PKM Assistant

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited]
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      command:
        description: 'Claude command to run'
        required: false
        default: '/daily'
        type: choice
        options:
          - '/daily'
          - '/weekly'
          - '/onboard'

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  CLAUDE_MODEL: 'claude-sonnet-4-6'
  TZ: 'America/New_York'

jobs:
  process-issue:
    name: Process Issue with Claude
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'issues' &&
      (contains(github.event.issue.labels.*.name, 'task') ||
       contains(github.event.issue.labels.*.name, 'idea') ||
       contains(github.event.issue.labels.*.name, 'claude'))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}

      - name: Process Issue Content
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          if [[ "${{ contains(github.event.issue.labels.*.name, 'task') }}" == "true" ]]; then
            claude code --model "$CLAUDE_MODEL" "Add this task to today's daily note: $ISSUE_TITLE - $ISSUE_BODY"
          elif [[ "${{ contains(github.event.issue.labels.*.name, 'idea') }}" == "true" ]]; then
            claude code --model "$CLAUDE_MODEL" "Capture this idea in the appropriate project or notes: $ISSUE_TITLE - $ISSUE_BODY"
          fi

          gh issue comment $ISSUE_NUMBER --body "✅ Processed by Claude Code and added to vault"
        env:
          CLAUDE_MODEL: ${{ env.CLAUDE_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Changes
        run: |
          git config --local user.email "claude-bot@example.com"
          git config --local user.name "Claude Assistant"
          git add .
          git diff --staged --quiet || git commit -m "Process issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          git push

  daily-note:
    name: Create Daily Note
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.command == '/daily'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}

      - name: Create Daily Note
        run: |
          claude code --model "$CLAUDE_MODEL" /onboard
          claude code --model "$CLAUDE_MODEL" /daily
        env:
          CLAUDE_MODEL: ${{ env.CLAUDE_MODEL }}

      - name: Commit Daily Note
        run: |
          git config --local user.email "claude-bot@example.com"
          git config --local user.name "Claude Assistant"
          git add .
          DATE=$(date +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "Daily note for $DATE"
          git push

  weekly-review:
    name: Run Weekly Review
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.command == '/weekly')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}

      - name: Run Weekly Review
        run: |
          claude code --model "$CLAUDE_MODEL" /onboard all
          claude code --model "$CLAUDE_MODEL" /weekly
          claude code --model "$CLAUDE_MODEL" "Create a summary of this week's accomplishments and next week's priorities"
        env:
          CLAUDE_MODEL: ${{ env.CLAUDE_MODEL }}

      - name: Commit Weekly Review
        run: |
          git config --local user.email "claude-bot@example.com"
          git config --local user.name "Claude Assistant"
          git add .
          WEEK=$(date +%Y-W%V)
          git diff --staged --quiet || git commit -m "Weekly review for $WEEK"
          git push

  assist-pr:
    name: Assist with Pull Request
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}

      - name: Review Changes
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main..HEAD)
          claude code --model "$CLAUDE_MODEL" "Review these changed files and provide feedback: $CHANGED_FILES"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(claude code --model \"$CLAUDE_MODEL\" 'Summarize your review findings')"
        env:
          CLAUDE_MODEL: ${{ env.CLAUDE_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
