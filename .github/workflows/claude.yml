# GitHub Action for Claude Code Integration

name: Claude Code PKM Assistant

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited]
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      command:
        description: 'Claude command to run'
        required: false
        default: '/daily'
        type: choice
        options:
          - '/daily'
          - '/weekly'
          - '/onboard'

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  CLAUDE_MODEL: 'claude-sonnet-4-6'
  TZ: 'America/New_York'

jobs:
  process-issue:
    name: Process Issue with Claude
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'issues' &&
      (contains(github.event.issue.labels.*.name, 'task') ||
       contains(github.event.issue.labels.*.name, 'idea') ||
       contains(github.event.issue.labels.*.name, 'claude'))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Process Issue Content
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            ISSUE TITLE: ${{ github.event.issue.title }}
            ISSUE BODY: ${{ github.event.issue.body }}
            ISSUE LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}

            Read the repository CLAUDE.md instructions first.

            If this issue has the `task` label, add it to today's daily note.
            If this issue has the `idea` label, capture it in the most appropriate
            project or note in the vault.
            If neither label applies, make no file changes.

            Make only the minimal vault changes required and do not modify unrelated files.
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
        env:
          CLAUDE_MODEL: ${{ env.CLAUDE_MODEL }}

      - name: Comment on Processed Issue
        run: gh issue comment ${{ github.event.issue.number }} --body "✅ Processed by Claude Code and added to vault"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Changes
        run: |
          git config --local user.email "claude-bot@example.com"
          git config --local user.name "Claude Assistant"
          git add .
          git diff --staged --quiet || git commit -m "Process issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          git push

  daily-note:
    name: Create Daily Note
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.command == '/daily'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Daily Note
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            TIME ZONE: ${{ env.TZ }}

            Read the repository CLAUDE.md instructions first.
            Then create or update today's daily note in the `Daily/` folder using the
            current runner date in the configured time zone.

            Follow the vault's daily note conventions and templates where appropriate.
            Make only the minimal changes needed for today's note.
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
        env:
          CLAUDE_MODEL: ${{ env.CLAUDE_MODEL }}

      - name: Commit Daily Note
        run: |
          git config --local user.email "claude-bot@example.com"
          git config --local user.name "Claude Assistant"
          git add .
          DATE=$(date +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "Daily note for $DATE"
          git push

  weekly-review:
    name: Run Weekly Review
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.command == '/weekly')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Weekly Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            TIME ZONE: ${{ env.TZ }}

            Read the repository CLAUDE.md instructions first.
            Perform the weekly review workflow for this Obsidian vault and update the
            relevant notes in place.

            Create a concise summary of this week's accomplishments and next week's
            priorities in the appropriate weekly review note.

            Make only the minimal required vault changes.
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
        env:
          CLAUDE_MODEL: ${{ env.CLAUDE_MODEL }}

      - name: Commit Weekly Review
        run: |
          git config --local user.email "claude-bot@example.com"
          git config --local user.name "Claude Assistant"
          git add .
          WEEK=$(date +%Y-W%V)
          git diff --staged --quiet || git commit -m "Weekly review for $WEEK"
          git push

  assist-pr:
    name: Assist with Pull Request
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Review Changes
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request and provide concise, actionable feedback focused
            on correctness, maintainability, and risk.

            Post the review summary as a pull request comment.
            Do not modify repository files.
          claude_args: |
            --model ${{ env.CLAUDE_MODEL }}
        env:
          CLAUDE_MODEL: ${{ env.CLAUDE_MODEL }}
